<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Navora">
  <defs>
    <linearGradient id="nv-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2230"/>
      <stop offset="1" stop-color="#080b11"/>
    </linearGradient>
    <linearGradient id="nv-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4D58D"/>
      <stop offset="0.5" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="nv-inner" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#D4AF37" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <filter id="nv-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile + inner glow -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#nv-bg)"
        stroke="#D4AF37" stroke-opacity="0.45"/>
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#nv-inner)"/>

  <!-- compass ring + cardinal ticks -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#D4AF37" stroke-opacity="0.28" stroke-width="1"/>
  <line x1="32" y1="5.5" x2="32" y2="11.5" stroke="url(#nv-gold)" stroke-width="2.2" stroke-linecap="round" filter="url(#nv-glow)"/>
  <line x1="52.5" y1="32" x2="58" y2="32" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="32" y1="52.5" x2="32" y2="58" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="11.5" y2="32" stroke="#D4AF37" stroke-opacity="0.4" stroke-width="1.4" stroke-linecap="round"/>

  <!-- subtle travel route -->
  <path d="M13 44 Q 32 9 51 30" fill="none" stroke="url(#nv-gold)" stroke-opacity="0.3"
        stroke-width="1.6" stroke-linecap="round" stroke-dasharray="1.2 4.5"/>

  <!-- N uprights -->
  <rect x="18" y="17" width="5" height="30" rx="2.2" fill="#ffffff"/>
  <rect x="41" y="17" width="5" height="30" rx="2.2" fill="#ffffff"/>

  <!-- compass needle = the N diagonal (two-tone) -->
  <g filter="url(#nv-glow)">
    <polygon points="20.5,17.5 35.45,29.26 43.5,46.5" fill="url(#nv-gold)"/>
    <polygon points="20.5,17.5 28.55,34.74 43.5,46.5" fill="#ffffff" fill-opacity="0.88"/>
  </g>

  <!-- pivot -->
  <circle cx="32" cy="32" r="2.7" fill="#080b11" stroke="url(#nv-gold)" stroke-width="1.5"/>
</svg>
