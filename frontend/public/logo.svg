<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Navora">
  <defs>
    <linearGradient id="nv-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141b26"/>
      <stop offset="1" stop-color="#090d13"/>
    </linearGradient>
    <linearGradient id="nv-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7d774"/>
      <stop offset="1" stop-color="#c79a32"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#nv-bg)"
        stroke="#c79a32" stroke-opacity="0.4"/>

  <!-- subtle travel route -->
  <path d="M13 45 Q 32 8 51 31" fill="none" stroke="url(#nv-gold)"
        stroke-opacity="0.28" stroke-width="2" stroke-linecap="round" stroke-dasharray="1.5 4.5"/>

  <!-- N uprights -->
  <rect x="17.5" y="16" width="5.4" height="32" rx="2.2" fill="#ffffff"/>
  <rect x="41.1" y="16" width="5.4" height="32" rx="2.2" fill="#ffffff"/>

  <!-- compass needle = the N diagonal (two halves like a needle) -->
  <polygon points="21,18 35.3,29.41 43,46" fill="url(#nv-gold)"/>
  <polygon points="21,18 28.7,34.59 43,46" fill="#ffffff" fill-opacity="0.85"/>

  <!-- compass pivot -->
  <circle cx="32" cy="32" r="2.6" fill="#0a0e14" stroke="url(#nv-gold)" stroke-width="1.4"/>
</svg>
